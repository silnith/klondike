name: Run MSBuild

on:
  workflow_call:
    inputs:
      name:
        description: A prefix for artifact names.
        type: string
        required: true
      directory:
        description: The directory that contains the solution file.
        type: string
        required: true
      solution_file:
        description: The name of the solution file.
        type: string
        required: true

env: {}

jobs:
  setup:
    name: Setup
    runs-on: windows-2022
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure GitHub Packages
        run: nuget sources add -Name GitHub -UserName ${{ github.actor }} -Password ${{ secrets.GITHUB_TOKEN }} -Source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json -NonInteractive
      - name: NuGet Restore
        run: nuget restore ${{ inputs.solution_file }} -NonInteractive
      - name: Upload Packages Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.name }}-packages
          # This action does not respect the working directory.
          path: ${{ inputs.directory }}/packages/
          if-no-files-found: error
  build:
    name: Build
    runs-on: windows-2022
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    needs:
      - setup
    strategy:
      matrix:
        platform:
          - x86
          - x64
          - ARM
          - ARM64
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64
          #vs-version: '[16.0,17.0)'
      - name: Download Packages Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.name }}-packages
          # This action does not respect the working directory.
          path: ${{ inputs.directory }}/packages/
      - name: Build
        run: msbuild ${{ inputs.solution_file }} -p:Configuration=${{ matrix.configuration }} -p:Platform=${{ matrix.platform }}
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.name }}-build-${{ matrix.platform }}-${{ matrix.configuration }}
          # This action does not respect the working directory.
          path: |
            ${{ inputs.directory }}/Debug/
            ${{ inputs.directory }}/Release/
            ${{ inputs.directory }}/x64/
            ${{ inputs.directory }}/ARM/
            ${{ inputs.directory }}/ARM64/
          if-no-files-found: error
  test-intel:
    name: Test Intel
    runs-on: windows-2022
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    needs:
      - build
    strategy:
      matrix:
        platform:
          - x86
          - x64
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Packages Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.name }}-packages
          # This action does not respect the working directory.
          path: ${{ inputs.directory }}/packages/
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.name }}-build-${{ matrix.platform }}-${{ matrix.configuration }}
          # This action does not respect the working directory.
          path: ${{ inputs.directory }}/
      - name: Run Tests
        run: '& "$(vswhere -property installationPath)\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" ".\**\*test*.dll" "/logger:trx"'
      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.name }}-test-results-${{ matrix.configuration }}
          # This action does not respect the working directory.
          path: |
            ${{ inputs.directory }}/**/TestResults/**/*.trx
          if-no-files-found: error
  test-arm:
    name: Test ARM
    runs-on: windows-11-arm
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    needs:
      - build
    strategy:
      matrix:
        platform:
          # ARM is disabled because Common7\IDE\Extensions\TestPlatform\Extensions\..\testhost.arm.exe is
#          - ARM
          - ARM64
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Packages Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.name }}-packages
          # This action does not respect the working directory.
          path: ${{ inputs.directory }}/packages/
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.name }}-build-${{ matrix.platform }}-${{ matrix.configuration }}
          # This action does not respect the working directory.
          path: ${{ inputs.directory }}/
      - name: Run Tests
        run: '& "$(vswhere -property installationPath)\Common7\IDE\Extensions\TestPlatform\vstest.console.arm64.exe" ".\**\*test*.dll" "/logger:trx"'
      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.name }}-test-results-${{ matrix.configuration }}
          # This action does not respect the working directory.
          path: |
            ${{ inputs.directory }}/**/TestResults/**/*.trx
          if-no-files-found: error
