name: Push Branch

on:
  push:
    branches:
      - '*'

env: {}

jobs:
  get-date:
    name: Date
    uses: silnith/github-workflows/.github/workflows/bash-get-date.yaml@main

  maven-cache:
    name: Maven Cache
    needs:
      - get-date
    uses: silnith/github-workflows/.github/workflows/maven-cache-dependencies.yaml@main
    with:
      directory: java/solitaire
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
  maven-build:
    name: Maven
    needs:
      - get-date
      - maven-cache
    uses: silnith/github-workflows/.github/workflows/maven-verify.yaml@main
    with:
      artifact-prefix: java
      directory: java/solitaire
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
      checks: write
  maven-test-results:
    name: Publish Maven Test Results
    needs:
      - maven-build
    uses: silnith/github-workflows/.github/workflows/publish-test-results.yaml@main
    with:
      check-name: Java Test Results
      artifact-pattern: java-target
      artifact-path: java/solitaire
      test-result-files: |
        java/solitaire/**/target/surefire-reports/TEST-*.xml
        java/solitaire/**/target/failsafe-reports/TEST-*.xml
    secrets: inherit
    permissions:
      checks: write

  dotnet-cache:
    name: .NET Cache
    needs:
      - get-date
    uses: silnith/github-workflows/.github/workflows/dotnet-cache-dependencies.yaml@main
    with:
      directory: csharp/Solitaire
      solution-file: Solitaire.sln
      dotnet-versions: 5.x
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
  dotnet-build:
    name: .NET
    needs:
      - get-date
      - dotnet-cache
    strategy:
      matrix:
        configuration:
          - Debug
          - Release
    uses: silnith/github-workflows/.github/workflows/dotnet-build.yaml@main
    with:
      artifact-prefix: csharp
      directory: csharp/Solitaire
      solution-file: Solitaire.sln
      configuration: ${{ matrix.configuration }}
      dotnet-versions: 5.x
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
  dotnet-test-results:
    name: Publish .NET Test Results
    needs:
      - dotnet-build
    uses: silnith/github-workflows/.github/workflows/publish-test-results.yaml@main
    with:
      check-name: C# Test Results
      artifact-pattern: csharp-dotnet-test-results-*
      artifact-path: csharp/Solitaire
      test-result-files: csharp/Solitaire/**/TestResults/**/*.trx
    secrets: inherit
    permissions:
      checks: write

  cpp-nuget:
    name: NuGet Cache
    needs:
      - get-date
    uses: silnith/github-workflows/.github/workflows/nuget-cache-dependencies.yaml@main
    with:
      directory: cpp/Solitaire
      solution-file: Solitaire.sln
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
  cpp-build-intel:
    name: C++
    needs:
      - get-date
      - cpp-nuget
    strategy:
      matrix:
        platform:
          - x86
          - x64
        configuration:
          - Debug
          - Release
    uses: silnith/github-workflows/.github/workflows/msbuild-intel.yaml@main
    with:
      artifact-prefix: cpp
      directory: cpp/Solitaire
      solution-file: Solitaire.sln
      platform: ${{ matrix.platform }}
      configuration: ${{ matrix.configuration }}
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
  cpp-build-arm:
    name: C++
    needs:
      - get-date
      - cpp-nuget
    strategy:
      matrix:
        platform:
# Path does not exist: \Common7\IDE\Extensions\TestPlatform\testhost.arm.exe
#          - ARM
          - ARM64
        configuration:
          - Debug
          - Release
    uses: silnith/github-workflows/.github/workflows/msbuild-arm.yaml@main
    with:
      artifact-prefix: cpp
      directory: cpp/Solitaire
      solution-file: Solitaire.sln
      platform: ${{ matrix.platform }}
      configuration: ${{ matrix.configuration }}
      year: ${{ needs.get-date.outputs.year }}
      month: ${{ needs.get-date.outputs.month }}
      day: ${{ needs.get-date.outputs.day }}
    secrets: inherit
    permissions:
      contents: read
  cpp-test-results:
    name: Publish VSTest Results
    needs:
      - cpp-build-intel
      - cpp-build-arm
    uses: silnith/github-workflows/.github/workflows/publish-test-results.yaml@main
    with:
      check-name: C++ Test Results
      artifact-pattern: cpp-vstest-test-results-*
      artifact-path: cpp/Solitaire
      test-result-files: |
        cpp/Solitaire/**/TestResults/**/*.trx
    secrets: inherit
    permissions:
      checks: write
