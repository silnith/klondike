name: Push Branch

on:
  push:
    branches:
      - '*'

jobs:
  build-cpp:
    name: C++
    uses: ./.github/workflows/run-msbuild.yaml
    with:
      name: cpp
      directory: cpp/Solitaire
      solution_file: Solitaire.sln
    secrets: inherit
    permissions:
      contents: read
      checks: write
  build-csharp:
    name: C#
    uses: ./.github/workflows/run-dotnet.yaml
    with:
      name: csharp
      directory: csharp/Solitaire
      solution_file: Solitaire.sln
    secrets: inherit
    permissions:
      contents: read
      checks: write
  build-java:
    name: Java
    uses: silnith/github-workflows/.github/workflows/maven-verify.yaml@main
    with:
      artifact-prefix: java
      directory: java/solitaire
    secrets: inherit
    permissions:
      contents: read
      packages: write
      checks: write
